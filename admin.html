<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — My Daily Link</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #22223a;
      --accent: #6c8eff; --accent-soft: rgba(108,142,255,0.12);
      --text: #f0f0f5; --muted: rgba(240,240,245,0.45);
      --border: rgba(240,240,245,0.08); --danger: #ff6b6b;
      --success: #5dca90;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 2rem 1.5rem;
    }
    .header {
      max-width: 700px; margin: 0 auto 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .logo span { color: var(--accent); }
    .badge {
      font-size: 11px; padding: 4px 10px;
      background: var(--accent-soft); color: var(--accent);
      border-radius: 20px; font-weight: 500;
    }
    .main { max-width: 700px; margin: 0 auto; }
    h2 { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 6px; }
    .sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; }

    .add-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 2rem;
    }
    .add-form h3 { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1; min-width: 160px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    .btn {
      padding: 10px 18px; border-radius: 10px; font-size: 14px;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost {
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger { background: rgba(255,107,107,0.12); color: var(--danger); border: 1px solid rgba(255,107,107,0.2); }
    .btn-danger:hover { background: rgba(255,107,107,0.2); }

    .members-list { display: flex; flex-direction: column; gap: 10px; }
    .member-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.1rem 1.4rem;
      transition: border-color 0.15s;
    }
    .member-card:hover { border-color: rgba(240,240,245,0.15); }
    .member-top { display: flex; align-items: center; gap: 14px; }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 500; font-size: 13px; flex-shrink: 0;
    }
    .member-meta { flex: 1; min-width: 0; }
    .member-name { font-size: 15px; font-weight: 500; }
    .member-link-display {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%; margin-top: 2px;
    }
    .member-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .pwa-link-row {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .pwa-link-box {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px;
      font-size: 12px; color: var(--accent); word-break: break-all;
      font-family: monospace;
    }
    .copy-btn {
      font-size: 12px; padding: 7px 12px;
      background: var(--accent-soft); color: var(--accent);
      border: 1px solid rgba(108,142,255,0.2);
      border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      white-space: nowrap; flex-shrink: 0; transition: background 0.15s;
    }
    .copy-btn:hover { background: rgba(108,142,255,0.22); }

    .edit-row {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border); gap: 8px; flex-wrap: wrap;
    }
    .edit-row.open { display: flex; }
    .edit-row input { flex: 1; min-width: 200px; }

    .empty { text-align: center; color: var(--muted); padding: 3rem; font-size: 14px; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px; font-size: 13px;
      display: none; white-space: nowrap; z-index: 99;
    }
    .toast.show { display: block; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform: translate(-50%, 8px); } to { opacity:1; transform: translate(-50%, 0); } }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">My Daily <span>Link</span></div>
  <span class="badge">Admin</span>
</div>

<div class="main">
  <h2>Members</h2>
  <p class="sub">Add members and set each person's individual link. Share their unique PWA URL with them once.</p>

  <div class="add-form">
    <h3>Add member</h3>
    <div class="form-row">
      <input type="text" id="new-name" placeholder="Member name" />
      <input type="text" id="new-link" placeholder="https://their-link.com" />
      <button class="btn btn-primary" onclick="addMember()">Add</button>
    </div>
  </div>

  <div class="members-list" id="members-list">
    <div class="empty" id="empty-state">No members yet. Add one above.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BASE_URL = window.location.origin;
  let members = JSON.parse(localStorage.getItem('mdl-members') || '[]');

  function save() {
    localStorage.setItem('mdl-members', JSON.stringify(members));
  }

  function initials(name) {
    return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  function pwaURL(member) {
    return `${BASE_URL}/index.html?member=${encodeURIComponent(member.id)}&link=${encodeURIComponent(member.link || '')}`;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function render() {
    const list = document.getElementById('members-list');
    const empty = document.getElementById('empty-state');
    list.innerHTML = '';
    if (members.length === 0) { list.appendChild(empty); return; }

    members.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'member-card';
      card.id = `card-${m.id}`;
      card.innerHTML = `
        <div class="member-top">
          <div class="avatar">${initials(m.name)}</div>
          <div class="member-meta">
            <div class="member-name">${m.name}</div>
            <div class="member-link-display">${m.link || 'No link set'}</div>
          </div>
          <div class="member-actions">
            <button class="btn btn-ghost" onclick="toggleEdit('${m.id}')">Edit</button>
            <button class="btn btn-danger" onclick="removeMember('${m.id}')">Remove</button>
          </div>
        </div>
        <div class="edit-row" id="edit-${m.id}">
          <input type="text" id="link-input-${m.id}" value="${m.link || ''}" placeholder="https://new-link.com" />
          <button class="btn btn-primary" onclick="saveLink('${m.id}')">Save</button>
          <button class="btn btn-ghost" onclick="toggleEdit('${m.id}')">Cancel</button>
        </div>
        <div class="pwa-link-row">
          <div class="pwa-link-box" id="pwa-url-${m.id}">${pwaURL(m)}</div>
          <button class="copy-btn" onclick="copyURL('${m.id}')">Copy link</button>
        </div>`;
      list.appendChild(card);
    });
  }

  function addMember() {
    const name = document.getElementById('new-name').value.trim();
    const link = document.getElementById('new-link').value.trim();
    if (!name) { toast('Please enter a name'); return; }
    const member = { id: Date.now().toString(), name, link };
    members.push(member);
    save(); render();
    document.getElementById('new-name').value = '';
    document.getElementById('new-link').value = '';
    toast(`${name} added`);
  }

  function removeMember(id) {
    members = members.filter(m => m.id !== id);
    save(); render();
    toast('Member removed');
  }

  function toggleEdit(id) {
    const row = document.getElementById(`edit-${id}`);
    row.classList.toggle('open');
  }

  function saveLink(id) {
    const val = document.getElementById(`link-input-${id}`).value.trim();
    const m = members.find(m => m.id === id);
    if (m) { m.link = val; save(); render(); toast('Link updated'); }
  }

  function copyURL(id) {
    const m = members.find(m => m.id === id);
    if (!m) return;
    navigator.clipboard.writeText(pwaURL(m)).then(() => toast('Link copied!'));
  }

  render();
</script>
</body>
</html>
